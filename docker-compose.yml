version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onlinequiz_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=OnlineQuizDb
      - DB_USER=sa
      - DB_PASSWORD=YourStrong!Passw0rd
    volumes:
      - .:/app
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: onlinequiz_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

volumes:
  mssql-data: